{% load static %}<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Связывание с CSS файлом -->
    <link rel="stylesheet" href={% static 'css/header.css' %}>
    <link rel="stylesheet" href={% static 'css/interesting.css' %}>
    <link rel="stylesheet" href={% static 'css/feedback.css' %}>
    <link rel="stylesheet" href={% static 'css/footer.css' %}>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Font Awesome подключение -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- Панель навигации -->
    <nav class="navbar navbar-expand-xl navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <!-- <img src="./img/bootstrap-solid.svg" width="30" height="30" class="d-inline-block align-top" alt="not found" loading="lazy"> -->
            <i class="fa-solid fa-seedling" style="color: #0efb35;"></i>
            <!-- <i class="fa-solid fa-gamepad fa-sm" style="color: #0efb35;"></i> -->
            Продукты 24
        </a>

        <!-- Кнопка бургер -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarWithDropdown" aria-controls="navbarWithDropdown" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarWithDropdown">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Доставка</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" role="button" data-bs-toggle="dropdown">
                        Категории
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Свежие овощи и фрукты</a></li>
                        <li><a class="dropdown-item" href="#">Молочная продукция</a></li>
                        <li><a class="dropdown-item" href="#">Мясо</a></li>
                    </ul>
                </li>
                <li class="nav-item dropdown">
                    {% if username %}
                    <a href="" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">{{ username }}</a>
                    <ul class="dropdown-menu">
                        <li>
                            <a class="dropdown-item" id="logout-link" href={% url 'logout' %}>Выйти</a>
                        </li>
                    </ul>
                    {% else %}
                    <a href={% url 'auth' %} class="nav-link">Вход / Регистрация</a>
                    {% endif %}
                </li>
            </ul>
        </div>
    </div>
    </nav>

    <main>
        {{ title }}
        <br>
        <img src={{ image.url }}>
    </main>

	<!-- Подвал -->
	<footer>
		<div class="container">
			<div class="row">
				<div class="col-lg-12">
					<div class="footer-info">
						Eduard Suyargulov
						<br>
						2025
						<br>
						<a href="https://t.me/suyargulov" target="_blank"><svg class="icon" id="telegram" viewBox="0 0 496 512"></svg></a>
						<a href="#" target="_blank"><svg class="icon" id="vk" viewBox="0 0 496 512"></svg></a>				
					</div>
				</div>
			</div>
		</div>
	</footer>
    
    <!-- jQuery 3.7.1 -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- Собственные JS-скрипты -->
    <script src={% static 'js/svg-paste.js' %}></script>
</body>
</html>
